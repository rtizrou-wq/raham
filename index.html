<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raham Gaming</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:tahoma}
body{background:#0b0b15;color:white}
.hero{height:400px;background:linear-gradient(135deg,#6a00ff,#ff0066);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px}
.hero h1{font-size:60px;margin-bottom:15px}
.hero p{font-size:20px;margin-bottom:20px}
.btn{background:white;color:#6a00ff;padding:15px 30px;text-decoration:none;border-radius:15px;font-weight:bold}
.search{padding:30px;text-align:center}
.search input{width:90%;max-width:600px;padding:15px;border:none;border-radius:15px;font-size:18px}
.videos{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;padding:30px}
.card{background:#161625;border-radius:20px;overflow:hidden;transition:.3s}
.card:hover{transform:translateY(-8px)}
.thumb{height:180px;background:linear-gradient(135deg,#8a2be2,#00d4ff);display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:bold}
.card h3{padding:15px}
.card a{display:block;text-align:center;padding:15px;background:#6a00ff;color:white;text-decoration:none}
footer{text-align:center;padding:30px;background:#111;margin-top:30px}
</style>
</head>
<body>
<section class="hero">
<h1>🎮 Raham Gaming</h1>
<p>کانال گیمینگ رهام</p>
<a class="btn" href="https://www.aparat.com/Raham325/videos" target="_blank">مشاهده کانال آپارات</a>
</section>
<section class="search">
<input type="text" id="search" placeholder="جستجوی ویدیو..." onkeyup="searchVideos()">
</section>
<section class="videos" id="videos">
<div class="card"><div class="thumb">🎮</div><h3>ماینکرافت بدوارز با رهام</h3></div>
<div class="card"><div class="thumb">🔥</div><h3>گری مودز</h3></div>
<div class="card"><div class="thumb">💀</div><h3>رولت روسی با رهام</h3></div>
<div class="card"><div class="thumb">🟦</div><h3>روبلاکس با پارکور</h3></div>
</section>
<footer>© Raham Gaming</footer>
<script>
function searchVideos(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");
cards.forEach(card=>{
let title=card.innerText.toLowerCase();
card.style.display=title.includes(input)?"block":"none";
});
}
</script>
</body>
</html>
